<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Put On</title>
<style>
:root {
  --bg-1: #fffaf0;
  --bg-2: #ffe9c6;
  --panel: rgba(255, 255, 255, 0.82);
  --panel-border: #efc58d;
  --ink: #2b3147;
  --muted: #59627d;
  --accent: #ff6b6b;
  --accent-strong: #f44747;
  --mint: #9be6d6;
  --gold: #ffd166;
  --shadow: rgba(43, 49, 71, 0.16);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  font-family: "Trebuchet MS", "Avenir Next", sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 15% 10%, rgba(255, 255, 255, 0.9) 0 10%, transparent 24%),
    radial-gradient(circle at 85% 8%, rgba(255, 242, 200, 0.95) 0 12%, transparent 26%),
    linear-gradient(165deg, var(--bg-1) 0%, #fff2dc 48%, var(--bg-2) 100%);
  display: flex;
  flex-direction: column;
}

#round-reset-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: transparent;
  border: none;
  padding: 0;
  appearance: none;
  cursor: pointer;
}

header {
  padding: 22px 28px 18px;
  text-align: center;
}

header h1 {
  font-size: clamp(2rem, 4vw, 3.2rem);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

header p {
  margin-top: 8px;
  font-size: 1.02rem;
  color: var(--muted);
}

.main {
  flex: 1;
  display: flex;
  gap: 24px;
  padding: 0 24px 24px;
  align-items: stretch;
}

.stage-side,
.panel {
  background: var(--panel);
  border: 2px solid var(--panel-border);
  border-radius: 28px;
  box-shadow: 0 14px 36px var(--shadow);
  backdrop-filter: blur(8px);
}

.stage-side {
  flex: 1.15;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 18px;
  padding: 22px;
}

.panel {
  flex: 0.9;
  min-width: 320px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  padding: 22px;
}

.section-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 12px;
}

.section-head h2 {
  font-size: 1.18rem;
}

.section-head-title {
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-head span {
  font-size: 0.92rem;
  color: var(--muted);
}

.selector-grid {
  display: flex;
  flex-direction: row;
  flex-wrap: nowrap;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
}

.character-btn {
  border: 2px solid #eed9b4;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.9);
  color: var(--ink);
  cursor: pointer;
  padding: 6px 8px 5px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font: inherit;
  font-size: 0.72rem;
  font-weight: 700;
  flex: 0 0 auto;
  transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
}

.character-btn svg {
  width: 36px;
  height: 36px;
  display: block;
}

.character-btn:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: 0 10px 22px rgba(43, 49, 71, 0.14);
}

.character-btn.active {
  border-color: var(--accent);
  background: #fff3f0;
}

.character-btn:disabled {
  cursor: default;
  opacity: 0.55;
}

.stage-wrap {
  position: relative;
  flex: 1;
  min-height: 430px;
  border-radius: 30px;
  overflow: hidden;
  padding: 18px 18px 24px;
  background:
    radial-gradient(circle at 22% 16%, rgba(255, 255, 255, 0.95) 0 10%, transparent 12%),
    radial-gradient(circle at 74% 20%, rgba(255, 255, 255, 0.85) 0 9%, transparent 11%),
    linear-gradient(180deg, #dff6ff 0%, #fef7de 62%, #f7d8a5 100%);
}

.stage-wrap::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 64px;
  border-top: 5px dashed rgba(126, 93, 47, 0.26);
}

.stage-label {
  position: relative;
  z-index: 2;
  display: inline-flex;
  padding: 8px 14px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.88);
  color: var(--muted);
  font-size: 0.92rem;
  box-shadow: 0 8px 16px rgba(43, 49, 71, 0.08);
}

.walk-track {
  position: absolute;
  inset: 0;
}

.character-slot {
  position: absolute;
  left: 10px;
  bottom: 34px;
  width: clamp(200px, 30vw, 300px);
  transform: translateX(0);
}

.character-canvas svg {
  width: 100%;
  height: auto;
  display: block;
  overflow: visible;
  filter: drop-shadow(0 14px 24px rgba(43, 49, 71, 0.18));
}

.speech-bubble {
  position: absolute;
  left: 50%;
  top: 4px;
  transform: translate(-50%, -105%);
  min-width: 164px;
  max-width: 230px;
  padding: 12px 14px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.94);
  border: 2px solid rgba(255, 255, 255, 0.98);
  box-shadow: 0 12px 24px rgba(43, 49, 71, 0.12);
  text-align: center;
  font-size: 1rem;
  font-weight: 800;
  z-index: 4;
}

.speech-bubble::after {
  content: "";
  position: absolute;
  left: 50%;
  bottom: -14px;
  width: 20px;
  height: 20px;
  margin-left: -10px;
  background: rgba(255, 255, 255, 0.94);
  transform: rotate(45deg);
  border-right: 2px solid rgba(255, 255, 255, 0.98);
  border-bottom: 2px solid rgba(255, 255, 255, 0.98);
}

.confetti-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.confetti {
  position: absolute;
  top: -16px;
  width: 10px;
  height: 16px;
  border-radius: 4px;
  opacity: 0.95;
  animation: confetti-fall 1.9s ease-out forwards;
  transform: translate3d(0, 0, 0) rotate(0deg);
}

.confetti.round {
  border-radius: 999px;
  width: 12px;
  height: 12px;
}

.ctrl-btn,
.finish-btn {
  font: inherit;
  font-weight: 800;
  border: none;
  cursor: pointer;
  transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
}

.ctrl-btn {
  padding: 12px 18px;
  border-radius: 999px;
  color: var(--ink);
}

.ctrl-btn:hover:not(:disabled),
.finish-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 18px rgba(43, 49, 71, 0.16);
}

.reset-icon-btn {
  padding: 6px 8px;
  border-radius: 10px;
  background: #ffd7d7;
  color: var(--ink);
  display: flex;
  align-items: center;
  justify-content: center;
}

.reset-icon-btn svg {
  flex: 0 0 auto;
}

.clothing-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(108px, 1fr));
  gap: 12px;
}

.item-btn {
  position: relative;
  min-height: 106px;
  padding: 16px 10px 12px;
  border: 3px solid #eadcc6;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.96);
  color: var(--ink);
  cursor: default;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-align: center;
  font: inherit;
  font-size: 0.9rem;
  font-weight: 800;
  transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
}

.item-btn:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: 0 10px 22px rgba(43, 49, 71, 0.14);
}

.item-btn.worn {
  border-color: var(--accent);
  background: #fff3f0;
}

.item-btn:disabled {
  cursor: default;
  opacity: 0.6;
}

.check {
  position: absolute;
  top: 8px;
  right: 10px;
  opacity: 0;
  transition: opacity 0.2s ease;
  color: var(--accent-strong);
}

.item-btn.worn .check {
  opacity: 1;
}

.item-icon svg {
  width: 44px;
  height: 44px;
  display: block;
}

.voice-hit {
  animation: voice-hit 0.5s ease;
}

.speech-controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.mic-btn {
  width: 100%;
  padding: 16px 18px;
  border: none;
  border-radius: 22px;
  background: linear-gradient(135deg, #1f6feb 0%, #45c1ff 100%);
  color: white;
  font: inherit;
  font-size: 1.08rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  cursor: pointer;
  transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
}

.mic-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 18px rgba(43, 49, 71, 0.16);
}

.mic-btn:disabled {
  cursor: default;
  opacity: 0.68;
}

.mic-btn.listening {
  background: linear-gradient(135deg, #ef476f 0%, #ff8fab 100%);
}

.recognized-text {
  border-radius: 18px;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.92);
  border: 2px solid #eadcc6;
  color: var(--ink);
  font-size: 0.95rem;
}

.recognized-text {
  min-height: 52px;
  margin-top: 10px;
  color: var(--muted);
  line-height: 1.35;
}

.recognized-text strong {
  color: var(--ink);
}

.finish-btn {
  width: 100%;
  padding: 18px 20px;
  border-radius: 22px;
  font-size: 1.15rem;
}

.finish-btn {
  background: linear-gradient(135deg, var(--accent) 0%, #ff9068 100%);
  color: white;
}

.finish-btn:disabled {
  cursor: default;
  opacity: 0.72;
}

.finish-btn.alert {
  animation: finish-alert 0.4s ease;
}

footer {
  padding: 0 24px 24px;
}

#sentence {
  min-height: 74px;
  background: rgba(43, 49, 71, 0.94);
  color: white;
  border-radius: 24px;
  padding: 18px 22px;
  font-size: clamp(1rem, 2.2vw, 1.28rem);
  line-height: 1.4;
  box-shadow: 0 10px 24px rgba(43, 49, 71, 0.2);
}

.clothing {
  transform-box: fill-box;
  transform-origin: center;
}

.hidden {
  display: none;
}

#character-body,
#walk-leg-left,
#walk-leg-right,
#walk-arm-left,
#walk-arm-right,
#wave-arm {
  transform-box: fill-box;
}

#character-body {
  transform-origin: center 75%;
}

#walk-leg-left,
#walk-leg-right {
  transform-origin: center top;
}

#walk-arm-left,
#walk-arm-right {
  transform-origin: 50% 12%;
}

#wave-arm {
  transform-origin: 86% 12%;
}

@keyframes pop-in {
  0% {
    transform: scale(0.28);
    opacity: 0;
  }

  65% {
    transform: scale(1.12);
  }

  100% {
    transform: scale(1);
    opacity: 1;
  }
}

@keyframes pop-off {
  0% {
    transform: scale(1);
    opacity: 1;
  }

  100% {
    transform: scale(0.05);
    opacity: 0;
  }
}

.anim-on {
  animation: pop-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.anim-off {
  animation: pop-off 0.2s ease-in forwards;
}

@keyframes sparkle {
  0% {
    transform: translate(0, 0) scale(1);
    opacity: 1;
  }

  100% {
    transform: translate(var(--dx), var(--dy)) scale(0.1);
    opacity: 0;
  }
}

.sparkle {
  animation: sparkle 0.55s ease-out forwards;
  pointer-events: none;
}

@keyframes finish-alert {
  0%,
  100% {
    transform: translateX(0);
  }

  25% {
    transform: translateX(-5px);
  }

  75% {
    transform: translateX(5px);
  }
}

@keyframes voice-hit {
  0%,
  100% {
    transform: translateY(0) scale(1);
  }

  35% {
    transform: translateY(-4px) scale(1.04);
    box-shadow: 0 12px 24px rgba(31, 111, 235, 0.24);
  }
}

@keyframes wave {
  0% {
    transform: rotate(0deg);
  }

  100% {
    transform: rotate(-18deg);
  }
}

.character-slot.waving #wave-arm {
  animation: wave 0.26s ease-in-out 6 alternate;
}

@keyframes walk-across {
  0% {
    transform: translateX(0);
  }

  100% {
    transform: translateX(var(--walk-distance));
  }
}

@keyframes body-bob {
  0%,
  100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-6px);
  }
}

@keyframes leg-left {
  0%,
  100% {
    transform: rotate(16deg);
  }

  50% {
    transform: rotate(-16deg);
  }
}

@keyframes leg-right {
  0%,
  100% {
    transform: rotate(-16deg);
  }

  50% {
    transform: rotate(16deg);
  }
}

@keyframes arm-left {
  0%,
  100% {
    transform: rotate(-10deg);
  }

  50% {
    transform: rotate(12deg);
  }
}

@keyframes arm-right {
  0%,
  100% {
    transform: rotate(12deg);
  }

  50% {
    transform: rotate(-10deg);
  }
}

.character-slot.walking {
  animation: walk-across 2.8s linear forwards;
}

.character-slot.walking #character-body {
  animation: body-bob 0.52s ease-in-out infinite;
}

.character-slot.walking #walk-leg-left {
  animation: leg-left 0.52s ease-in-out infinite;
}

.character-slot.walking #walk-leg-right {
  animation: leg-right 0.52s ease-in-out infinite;
}

.character-slot.walking #walk-arm-left {
  animation: arm-left 0.52s ease-in-out infinite;
}

.character-slot.walking #walk-arm-right {
  animation: arm-right 0.52s ease-in-out infinite;
}

@keyframes confetti-fall {
  0% {
    transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
    opacity: 0;
  }

  10% {
    opacity: 1;
  }

  100% {
    transform: translate3d(var(--drift), 410px, 0) rotate(var(--spin)) scale(0.9);
    opacity: 0;
  }
}

:focus-visible {
  outline: 3px solid var(--accent);
  outline-offset: 3px;
}

@media (max-width: 980px) {
  .main {
    flex-direction: column;
  }

  .panel {
    min-width: 0;
  }
}

@media (max-width: 680px) {
  header {
    padding-inline: 18px;
  }

  .main,
  footer {
    padding-inline: 16px;
  }

  .main {
    padding-bottom: 16px;
  }

  .stage-side,
  .panel {
    padding: 18px;
    border-radius: 24px;
  }

  .stage-wrap {
    min-height: 390px;
  }

.clothing-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .character-slot {
    width: min(230px, 68vw);
  }
}
</style>
</head>
<body>
<header>
  <h1>Put On</h1>
  <p>キャラクターを えらんで、ふくを きせて、しゅっぱつさせよう。</p>
</header>

<main class="main">
  <section class="stage-side" aria-label="キャラクターステージ">
    <div class="selector-grid" id="character-selector" role="group" aria-label="キャラクターえらび"></div>

    <div class="stage-wrap">
      <div class="stage-label">ふくを きせたら、「できあがり」を おしてね。</div>
      <div class="walk-track" id="walk-track">
        <div class="character-slot" id="character-slot">
          <div class="speech-bubble" id="speech-bubble" hidden>じゅんび できた！</div>
          <div class="character-canvas" id="character-canvas"></div>
        </div>
      </div>
      <div class="confetti-overlay" id="confetti-overlay" aria-hidden="true"></div>
    </div>
  </section>

  <section class="panel" aria-label="ふくのコントロール">
    <div class="section-head">
      <div class="section-head-title">
        <h2>ふく</h2>
        <button class="ctrl-btn reset-icon-btn" id="btn-reset" title="ふくをリセット" aria-label="ふくをリセット">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="clothing-grid" id="clothing-grid" role="group" aria-label="ふくのアイテム"></div>

    <div class="speech-controls" aria-label="おんせいコントロール">
      <button class="mic-btn" id="btn-mic" type="button" aria-label="おんせいにんしきを はじめる">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 3a3 3 0 0 1 3 3v5a3 3 0 0 1-6 0V6a3 3 0 0 1 3-3Z"/>
          <path d="M19 11a7 7 0 0 1-14 0"/>
          <path d="M12 18v3"/>
          <path d="M8 21h8"/>
        </svg>
        <span id="mic-label">タップして はなす</span>
      </button>
    </div>

    <button class="finish-btn" id="btn-finish">できあがり</button>
    <div class="recognized-text" id="recognized-text" aria-live="polite"><strong>きこえた ことば:</strong> <span id="recognized-value">まだありません。</span></div>
  </section>
</main>

<footer>
  <div id="sentence" aria-live="polite" aria-atomic="true">きょうは なにを きる？</div>
</footer>

<button id="round-reset-overlay" type="button" aria-label="もういちど はじめる" hidden></button>

<script>
const COLORS = ['#ffe066', '#ff6b6b', '#4ecdc4', '#a78bfa', '#8bd3dd', '#ff9f68'];
const UI_TEXT = {
  defaultPrompt: 'きょうは なにを きる？',
  resetPrompt: 'あたらしい ふくに なったよ。なにを きる？',
  tapToSpeak: 'タップして はなす',
  listening: 'きいているよ...',
  unsupported: 'このブラウザでは おんせいにんしきが つかえません。',
  micBlocked: 'マイクが つかえません。',
  tryAgain: 'もういちど はなしてね。',
  emptyFinish: 'なにか ひとつ きてね。',
  ready: 'じゅんび できた！',
  clickAnywhere: 'どこでも クリックして もういちど。',
  nothingYet: 'まだありません。',
};
const SPEECH_TEXT = {
  emptyFinish: 'Please put on at least one item.',
};
const LETS_PHRASES = [
  "Let's go!",
  "Let's do this!",
  "Let's play baseball!",
  "Let's play games!",
  "Let's play cards!",
  "Let's play dodgeball!",
  "Let's play badminton!",
  "Let's go to Starbucks!",
  "Let's go to AEON Town!",
  "Let's go to LaLaport!",
  "Let's go to Saizeriya!",
  "Let's go to Tokyo!",
  "Let's go outside!",
  "Let's have fun!",
  "Let's get going!",
];
const CHARACTER_VOICE_PROFILES = {
  robot: { rate: 0.86, pitch: 0.72, voiceHints: ['david', 'mark', 'guy', 'male'] },
  cat: { rate: 1.16, pitch: 1.48, voiceHints: ['zira', 'aria', 'samantha', 'female'] },
  dinosaur: { rate: 0.9, pitch: 0.78, voiceHints: ['david', 'mark', 'guy', 'male'] },
  alien: { rate: 1.06, pitch: 1.62, voiceHints: ['zira', 'aria', 'samantha', 'female'] },
  monkey: { rate: 1.18, pitch: 1.28, voiceHints: ['guy', 'mark', 'zira', 'aria'] },
  penguin: { rate: 0.96, pitch: 1.04, voiceHints: ['samantha', 'zira', 'aria', 'female'] },
  dragon: { rate: 0.78, pitch: 0.62, voiceHints: ['david', 'mark', 'guy', 'male'] },
  unicorn: { rate: 1.02, pitch: 1.68, voiceHints: ['samantha', 'zira', 'aria', 'female'] },
  student: { rate: 1.0, pitch: 1.0, voiceHints: ['aria', 'zira', 'david', 'mark'] },
};

const ITEMS = [
  {
    id: 'hat',
    label: 'ぼうし',
    cardLabel: 'Hat',
    phrase: 'ぼうし',
    speechPhrase: 'a hat',
    svgIds: ['clothing-hat'],
    putOn: 'ぼうしを かぶろう！',
    takeOff: 'ぼうしを ぬごう。',
    speakPutOn: 'Put on your hat!',
    speakTakeOff: 'Take off your hat.',
    icon: `<svg viewBox='0 0 48 48' fill='none'>
      <rect x='6' y='26' width='36' height='10' rx='5' fill='#ff9f43'/>
      <rect x='12' y='8' width='24' height='22' rx='7' fill='#ff9f43'/>
      <rect x='12' y='24' width='24' height='6' fill='#f45d23'/>
    </svg>`,
  },
  {
    id: 'shirt',
    label: 'シャツ',
    cardLabel: 'Shirt',
    phrase: 'シャツ',
    speechPhrase: 'a shirt',
    svgIds: ['clothing-shirt', 'clothing-shirt-sleeve-left', 'clothing-shirt-sleeve-right'],
    putOn: 'シャツを きよう！',
    takeOff: 'シャツを ぬごう。',
    speakPutOn: 'Put on your shirt!',
    speakTakeOff: 'Take off your shirt.',
    icon: `<svg viewBox='0 0 48 48' fill='none'>
      <path d='M12 10 4 22 14 24 15 40 33 40 34 24 44 22 36 10 27 17 24 21 21 17Z' fill='#4ecdc4'/>
    </svg>`,
  },
  {
    id: 'jacket',
    label: 'ジャケット',
    cardLabel: 'Jacket',

function randomizeClothingVariants() {
  ITEMS.forEach((item) => {
    currentVariants[item.id] = Math.floor(Math.random() * VARIANT_COUNT);
  });
}

function getClothingVariant(itemId) {
  return currentVariants[itemId] ?? 0;
}

function buildItemButtonMarkup(item) {
  return `<span class='check' aria-hidden='true'>Yes</span>
    <span class='item-icon'>${buildClothingIcon(item.id, getClothingVariant(item.id))}</span>
    <span>${item.cardLabel || item.label}</span>`;
}

function refreshClothingButtons() {
  ITEMS.forEach((item) => {
    const button = grid.querySelector(`[data-id='${item.id}']`);
    if (!button) {
      return;
    }

    button.innerHTML = buildItemButtonMarkup(item);
    const active = worn.has(item.id);
    button.classList.toggle('worn', active);
    button.setAttribute('aria-pressed', String(active));
  });
}

function renderClothingVariants() {
  const mode = currentCharacter === 'robot' ? 'robot' : 'shared';
  ITEMS.forEach((item) => {
    item.svgIds.forEach((partId) => {
      const element = document.getElementById(partId);
      if (!element) {
        return;
      }

      element.innerHTML = buildClothingVariantMarkup(item.id, mode, partId, getClothingVariant(item.id));
    });
  });
  refreshClothingButtons();
}

function buildClothingIcon(itemId, variantIndex) {
  if (itemId === 'shoes') {
    return `<svg viewBox='0 0 48 48' fill='none'>
      ${buildClothingVariantMarkup(itemId, 'icon', 'clothing-shoe-left', variantIndex)}
      ${buildClothingVariantMarkup(itemId, 'icon', 'clothing-shoe-right', variantIndex)}
    </svg>`;
  }

  const item = ITEM_LOOKUP[itemId];
  return `<svg viewBox='0 0 48 48' fill='none'>
    ${buildClothingVariantMarkup(itemId, 'icon', item.svgIds[0], variantIndex)}
  </svg>`;
}

function buildClothingVariantMarkup(itemId, mode, partId, variantIndex) {
  const slots = CLOTHING_SLOTS[itemId];
  const slot = slots[mode][partId] || slots[mode].default;
  return `<g transform="translate(${slot.x} ${slot.y}) scale(${slot.width / slots.baseWidth} ${slot.height / slots.baseHeight})">
    ${buildVariantContent(itemId, variantIndex, partId, mode)}
  </g>`;
}

function buildVariantContent(itemId, variantIndex, partId, mode = 'shared') {
  switch (itemId) {
    case 'hat':
      return buildHatContent(variantIndex);
    case 'shirt':
      if (partId === 'clothing-shirt-sleeve-left') return buildShirtSleeveLeftContent(variantIndex);
      if (partId === 'clothing-shirt-sleeve-right') return buildShirtSleeveRightContent(variantIndex);
      if (mode === 'robot') return buildShirtBodyContent(variantIndex);
      return buildShirtContent(variantIndex);
    case 'jacket':
      if (partId === 'clothing-jacket-sleeve-left') return buildJacketSleeveLeftContent(variantIndex);
      if (partId === 'clothing-jacket-sleeve-right') return buildJacketSleeveRightContent(variantIndex);
      if (mode === 'robot') return buildJacketBodyContent(variantIndex);
      return buildJacketContent(variantIndex);
    case 'glasses':
      return buildGlassesContent(variantIndex);
    case 'watch':
      return buildWatchContent(variantIndex);
    case 'ring':
      return buildRingContent(variantIndex);
    case 'shoes':
      return buildShoeContent(variantIndex, partId);
    default:
      return '';
  }
}

const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
const speechSupported = Boolean(SpeechRecognitionCtor);
const LISTEN_TIMEOUT_MS = 8000;
const SPEECH_KEYWORDS = [
  { itemId: 'glasses', keywords: ['glasses'] },
  { itemId: 'jacket', keywords: ['jacket'] },
  { itemId: 'shirt', keywords: ['shirt'] },
  { itemId: 'shoes', keywords: ['shoes', 'shoe'] },
  { itemId: 'watch', keywords: ['watch'] },
  { itemId: 'ring', keywords: ['ring'] },
  { itemId: 'hat', keywords: ['hat'] },
];

resetButton.addEventListener('click', () => {
  if (celebrationMode) {
    return;
  }

  stopSpeechRecognition({ reason: 'reset' });
  clearQueuedTasks();
  setAwaitingRoundReset(false);
  hideBubble();
  clearConfetti();
  randomizeClothingVariants();
  clearOutfit({ rerender: true });
  resetSpeechFeedback();
  say(UI_TEXT.resetPrompt);
  if (soundOn) {
    tone(330);
  }
});

micButton.addEventListener('click', handleMicButtonClick);
finishButton.addEventListener('click', () => handleFinish());
roundResetOverlay.addEventListener('click', startNewRound);

characterSlot.addEventListener('animationend', (event) => {
  if (event.target === characterSlot && event.animationName === 'walk-across') {
    finishCelebration();
  }
});

initializeSpeechControls();

function buildCharacterSelector() {
  CHARACTERS.forEach((character) => {
    const button = document.createElement('button');
    button.className = 'character-btn';
    button.type = 'button';
    button.dataset.character = character.id;
    button.setAttribute('aria-pressed', 'false');
    button.innerHTML = `${character.preview}<span>${character.cardLabel || character.label}</span>`;
    button.addEventListener('click', () => chooseCharacter(character.id));
    selector.appendChild(button);
  });
}

function buildClothingButtons() {
  ITEMS.forEach((item) => {
    const button = document.createElement('button');
    button.className = 'item-btn';
    button.type = 'button';
    button.dataset.id = item.id;
    button.setAttribute('aria-pressed', 'false');
    button.setAttribute('aria-disabled', 'true');
    button.tabIndex = -1;
    button.innerHTML = buildItemButtonMarkup(item);
    grid.appendChild(button);
  });
}

function initializeSpeechControls() {
  if (!speechSupported) {
    micButton.disabled = true;
    recognizedValue.textContent = UI_TEXT.unsupported;
    return;
  }

  recognition = new SpeechRecognitionCtor();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 5;

  recognition.onstart = () => {
    recognitionActive = true;
    microphonePermissionPrimed = true;
    micButton.classList.add('listening');
    micLabel.textContent = UI_TEXT.listening;
    if (!speechSessionHadResult) {
      recognizedValue.textContent = UI_TEXT.listening;
    }
  };

  recognition.onresult = (event) => {
    if (!isListening) { return; }
    const results = Array.from(event.results).slice(event.resultIndex);
    for (const result of results) {
      const transcripts = getRecognitionTranscripts(result);
      if (!transcripts.length) {
        continue;
      }

      speechSessionHadResult = true;
      refreshListeningDeadline();
      recognizedValue.textContent = transcripts[0];
      handleSpeechTranscript(transcripts[0], {
        isFinal: result.isFinal,
        transcriptAlternatives: transcripts,
      });
    }
  };

  recognition.onerror = (event) => {
    if (event.error === 'aborted') {
      return;
    }

    if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
      const message = UI_TEXT.micBlocked;
      speechSessionHandled = true;
      recognizedValue.textContent = message;
      say(message);
      stopSpeechRecognition({ reason: 'blocked' });
      return;
    }

    recognizedValue.textContent = getSpeechErrorMessage(event.error);

    if (event.error === 'no-speech') {
      if (shouldKeepRecognitionAlive()) {
        scheduleRecognitionRestart(160);
        return;
      }

      stopSpeechRecognition({ reason: 'timeout' });
      return;
    }

    if ((event.error === 'network' || event.error === 'audio-capture') && shouldKeepRecognitionAlive()) {
      scheduleRecognitionRestart(event.error === 'network' ? 260 : 220);
      return;
    }

    speechSessionHandled = true;
    say(UI_TEXT.tryAgain);
    stopSpeechRecognition({ reason: 'error' });
  };

  recognition.onend = () => {
    recognitionActive = false;

    if (shouldKeepRecognitionAlive()) {
      scheduleRecognitionRestart(180);
      return;
    }

    if (isListening && speechStopReason === null && Date.now() >= listeningDeadline) {
      speechStopReason = 'timeout';
    }

    finalizeSpeechSession();
  };
}

async function handleMicButtonClick() {
  if (celebrationMode) {
    return;
  }

  if (!speechSupported) {
    const message = UI_TEXT.unsupported;
    recognizedValue.textContent = message;
    say(message);
    return;
  }

  if (isListening) {
    return;
  }

  const permissionReady = await ensureMicrophoneReady();
  if (!permissionReady) {
    return;
  }

  beginSpeechSession();
}

function beginSpeechSession() {
  if (!recognition || isListening) {
    return;
  }

  window.clearTimeout(recognitionTimeoutId);
  window.clearTimeout(recognitionRestartId);
  isListening = true;
  speechSessionHadResult = false;
  speechSessionHandled = false;
  speechSessionFinalized = false;
  speechStopReason = null;
  lastSpeechCommandKey = '';
  lastSpeechCommandAt = 0;
  recognizedValue.textContent = UI_TEXT.listening;
  micButton.classList.add('listening');
  micLabel.textContent = UI_TEXT.listening;
  refreshListeningDeadline();
  startRecognition();
}

function refreshListeningDeadline() {
  listeningDeadline = Date.now() + LISTEN_TIMEOUT_MS;
  window.clearTimeout(recognitionTimeoutId);
  recognitionTimeoutId = window.setTimeout(() => {
    stopSpeechRecognition({ reason: 'timeout' });
  }, LISTEN_TIMEOUT_MS);
}

function startRecognition() {
  if (!recognition || !isListening || recognitionActive) {
    return;
  }

  if (speechStopReason !== null) {
    return;
  }

  if (Date.now() >= listeningDeadline) {
    stopSpeechRecognition({ reason: 'timeout' });
    return;
  }

  window.clearTimeout(recognitionRestartId);
  try {
    recognition.start();
  } catch (error) {
    if (error && error.name === 'InvalidStateError') {
      scheduleRecognitionRestart(220);
      return;
    }

    if (error && (error.name === 'NotAllowedError' || error.name === 'SecurityError')) {
      speechSessionHandled = true;
      recognizedValue.textContent = UI_TEXT.micBlocked;
      say(UI_TEXT.micBlocked);
      stopSpeechRecognition({ reason: 'blocked' });
      return;
    }

    speechSessionHandled = true;
    recognizedValue.textContent = UI_TEXT.tryAgain;
    say(UI_TEXT.tryAgain);
    stopSpeechRecognition({ reason: 'error' });
  }
}

function scheduleRecognitionRestart(delay = 140) {
  if (!shouldKeepRecognitionAlive()) {
    return;
  }

  window.clearTimeout(recognitionRestartId);
  recognitionRestartId = window.setTimeout(() => {
    if (!shouldKeepRecognitionAlive()) {
      return;
    }
    startRecognition();
  }, Math.min(delay, Math.max(0, listeningDeadline - Date.now())));
}

function stopSpeechRecognition({ reason = 'manual' } = {}) {
  if (!recognition) {
    return;
  }

  const sessionWasOpen = isListening || !speechSessionFinalized;
  isListening = false;
  speechStopReason = speechStopReason || reason;
  window.clearTimeout(recognitionTimeoutId);
  window.clearTimeout(recognitionRestartId);

  if (recognitionActive) {
    try {
      recognition.stop();
    } catch (error) {
      finalizeSpeechSession();
    }
    return;
  }

  if (sessionWasOpen) {
    finalizeSpeechSession();
  }
}

function finalizeSpeechSession() {
  if (speechSessionFinalized) {
    return;
  }

  speechSessionFinalized = true;
  recognitionActive = false;
  window.clearTimeout(recognitionTimeoutId);
  window.clearTimeout(recognitionRestartId);
  micButton.classList.remove('listening');
  micLabel.textContent = UI_TEXT.tapToSpeak;

  if (speechStopReason === 'timeout' && !speechSessionHadResult && !speechSessionHandled) {
    recognizedValue.textContent = UI_TEXT.tryAgain;
    say(UI_TEXT.tryAgain);
  }

  speechStopReason = null;
  listeningDeadline = 0;
}

function shouldKeepRecognitionAlive() {
  return isListening && speechStopReason === null && Date.now() < listeningDeadline;
}

function resetSpeechFeedback() {
  recognizedValue.textContent = UI_TEXT.nothingYet;
}

function setAwaitingRoundReset(enabled) {
  awaitingRoundReset = enabled;
  roundResetOverlay.hidden = !enabled;
}

async function ensureMicrophoneReady() {
  if (microphonePermissionPrimed) {
    return true;
  }

  if (navigator.permissions?.query) {
    try {
      const permissionStatus = await navigator.permissions.query({ name: 'microphone' });
      if (permissionStatus.state === 'granted') {
        microphonePermissionPrimed = true;
        return true;
      }

      if (permissionStatus.state === 'denied') {
        const message = UI_TEXT.micBlocked;
        recognizedValue.textContent = message;
        say(message);
        return false;
      }
    } catch (error) {
    }
  }

  return true;
}

function getRecognitionTranscripts(result) {
  return Array.from(result)
    .map((alternative) => alternative?.transcript?.trim() || '')
    .filter(Boolean);
}

function getSpeechErrorMessage(errorCode) {
  switch (errorCode) {
    case 'no-speech':
      return 'No speech detected.';
    case 'audio-capture':
      return 'No microphone audio detected.';
    case 'network':
      return 'Speech service network error.';
    default:
      return `Speech error: ${errorCode}`;
  }
}

function shouldIgnoreDuplicateSpeechCommand(itemId) {
  const commandKey = `${currentCharacter}:${itemId}`;
  const now = Date.now();
  if (lastSpeechCommandKey === commandKey && now - lastSpeechCommandAt < 1200) {
    return true;
  }

  lastSpeechCommandKey = commandKey;
  lastSpeechCommandAt = now;
  return false;
}

function handleSpeechTranscript(transcript, { isFinal = true, transcriptAlternatives = [transcript] } = {}) {
  const candidates = transcriptAlternatives
    .map((value) => value.trim())
    .filter(Boolean);
  const normalizedCandidates = candidates.map((value) => value.toLowerCase());

  if (!normalizedCandidates.length) {
    if (!isFinal) {
      return false;
    }

    speechSessionHandled = true;
    recognizedValue.textContent = UI_TEXT.tryAgain;
    say(UI_TEXT.tryAgain);
    return false;
  }

  const finishTranscriptIndex = normalizedCandidates.findIndex((value) => /^let'?s\s+\w+/i.test(value));
  if (finishTranscriptIndex !== -1) {
    const display = candidates[finishTranscriptIndex].charAt(0).toUpperCase() + candidates[finishTranscriptIndex].slice(1);
    speechSessionHandled = true;
    handleFinish(display);
    return true;
  }

  const item = findSpeechItem(normalizedCandidates);
  if (!item) {
    if (!isFinal) {
      return false;
    }

    speechSessionHandled = true;
    recognizedValue.textContent = candidates[0];
    say(UI_TEXT.tryAgain);
    return false;
  }

  speechSessionHandled = true;
  if (shouldIgnoreDuplicateSpeechCommand(item.id)) {
    return true;
  }

  toggleItem(item, { forceState: true, announce: false, audioFeedback: false });
  flashItemButton(item.id);

  const successMessage = `いいね！${item.label}を つけたよ。`;
  say(successMessage);
  if (soundOn) {
    tone(680);
  }
  return true;
}

function findSpeechItem(transcriptOrList) {
  const transcripts = Array.isArray(transcriptOrList) ? transcriptOrList : [transcriptOrList];
  for (const transcript of transcripts) {
    const match = SPEECH_KEYWORDS.find(({ keywords }) => keywords.some((keyword) => hasKeyword(transcript, keyword)));
    if (match) {
      return ITEM_LOOKUP[match.itemId];
    }
  }

  return null;
}

function hasKeyword(text, keyword) {
  return new RegExp(`\\b${keyword.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\$&')}\\b`).test(text);
}

function flashItemButton(itemId) {
  const button = grid.querySelector(`[data-id='${itemId}']`);
  if (!button) {
    return;
  }

  button.classList.remove('voice-hit');
  void button.offsetWidth;
  button.classList.add('voice-hit');
  button.addEventListener('animationend', () => button.classList.remove('voice-hit'), { once: true });
}

function chooseCharacter(characterId) {
  if (celebrationMode || characterId === currentCharacter) {
    return;
  }

  currentCharacter = characterId;
  worn = new Set();
  renderCharacter();
  syncCharacterButtons();
  syncItemButtons();
  hideBubble();
  if (isListening) {
    recognizedValue.textContent = UI_TEXT.listening;
  } else {
    resetSpeechFeedback();
  }
  say(UI_TEXT.defaultPrompt);
}

function renderCharacter() {
  characterCanvas.innerHTML = buildCharacterSvg(currentCharacter);
  mouth = document.getElementById('character-mouth');
  sparkles = document.getElementById('sparkle-layer');
  renderClothingVariants();
  applyWornState();
  updateMouth();
}

function buildCharacterSvg(characterId) {
  const builder = CHARACTER_SVGS[characterId];
  const viewBox = characterId === 'robot' ? '0 0 220 340' : '0 0 240 340';
  return `<svg id='character-svg' viewBox='${viewBox}' xmlns='http://www.w3.org/2000/svg' aria-hidden='true'>
    <g id='character-body'>
      ${builder()}
      <g id='sparkle-layer'></g>
    </g>
  </svg>`;
}

function applyWornState() {
  ITEMS.forEach((item) => {
    item.svgIds.forEach((id) => {
      const element = document.getElementById(id);
      if (!element) {
        return;
      }

      element.classList.remove('anim-on', 'anim-off');
      if (worn.has(item.id)) {
        element.classList.remove('hidden');
      } else {
        element.classList.add('hidden');
      }
    });
  });
}

function syncCharacterButtons() {
  selector.querySelectorAll('.character-btn').forEach((button) => {
    const active = button.dataset.character === currentCharacter;
    button.classList.toggle('active', active);
    button.setAttribute('aria-pressed', String(active));
  });
}

function syncItemButtons() {
  grid.querySelectorAll('.item-btn').forEach((button) => {
    const active = worn.has(button.dataset.id);
    button.classList.toggle('worn', active);
    button.setAttribute('aria-pressed', String(active));
  });
}

function toggleItem(item, options = {}) {
  if (celebrationMode) {
    return;
  }

  speak(item.cardLabel);

  const { forceState, announce = true, audioFeedback = true } = options;
  const button = grid.querySelector(`[data-id='${item.id}']`);
  const wearing = worn.has(item.id);
  const nextState = typeof forceState === 'boolean' ? forceState : !wearing;

  if (nextState === wearing) {
    if (nextState) {
      const leadElement = document.getElementById(item.svgIds[0]);
      if (leadElement) {
        spawnSparkles(leadElement);
      }
    }
    updateMouth();
    return;
  }

  if (!nextState) {
    worn.delete(item.id);
    button.classList.remove('worn');
    button.setAttribute('aria-pressed', 'false');
    item.svgIds.forEach((id) => {
      const element = document.getElementById(id);
      if (element) {
        animOff(element);
      }
    });
    if (announce) {
      say(item.takeOff);
    }
    if (audioFeedback && soundOn) {
      tone(360);
      speak(item.speakTakeOff || item.takeOff);
    }
  } else {
    worn.add(item.id);
    button.classList.add('worn');
    button.setAttribute('aria-pressed', 'true');
    item.svgIds.forEach((id, index) => {
      const element = document.getElementById(id);
      if (element) {
        animOn(element);
        if (index === 0) {
          spawnSparkles(element);
        }
      }
    });
    if (announce) {
      say(item.putOn);
    }
    if (audioFeedback && soundOn) {
      tone(680);
      speak(item.speakPutOn || item.putOn);
    }
  }

  updateMouth();
}

function animOn(element) {
  element.classList.remove('hidden', 'anim-off');
  requestAnimationFrame(() => {
    element.classList.add('anim-on');
    element.addEventListener('animationend', () => {
      element.classList.remove('anim-on');
    }, { once: true });
  });
}

function animOff(element) {
  element.classList.remove('anim-on');
  element.classList.add('anim-off');
  element.addEventListener('animationend', () => {
    element.classList.add('hidden');
    element.classList.remove('anim-off');
  }, { once: true });
}

function spawnSparkles(element) {
  if (!sparkles) {
    return;
  }

  let centerX = 120;
  let centerY = 160;

  try {
    const box = element.getBBox();
    centerX = box.x + box.width / 2;
    centerY = box.y + box.height / 2;
  } catch (error) {
  }

  for (let index = 0; index < 10; index += 1) {
    const angle = (index / 10) * Math.PI * 2 + Math.random() * 0.25;
    const distance = 28 + Math.random() * 38;
    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', centerX);
    dot.setAttribute('cy', centerY);
    dot.setAttribute('r', 3 + Math.random() * 3.5);
    dot.setAttribute('fill', COLORS[index % COLORS.length]);
    dot.classList.add('sparkle');
    dot.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
    dot.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
    sparkles.appendChild(dot);
    dot.addEventListener('animationend', () => dot.remove(), { once: true });
  }
}

function updateMouth(mode = 'auto') {
  if (!mouth) {
    return;
  }

  let path = 'M 96 102 Q 120 108 144 102';

  if (currentCharacter === 'robot') {
    if (mode === 'ready') {
      path = 'M 81 68 Q 110 92 139 68';
    } else if (worn.size === 0) {
      path = 'M 83 72 Q 110 80 137 72';
    } else if (worn.size <= 3) {
      path = 'M 82 70 Q 110 86 138 70';
    } else {
      path = 'M 80 67 Q 110 90 140 67';
    }
  } else if (mode === 'ready') {
    path = 'M 94 100 Q 120 116 146 100';
  } else if (worn.size === 0) {
    path = 'M 96 102 Q 120 108 144 102';
  } else if (worn.size <= 3) {
    path = 'M 95 100 Q 120 114 145 100';
  } else {
    path = 'M 92 98 Q 120 118 148 98';
  }

  mouth.setAttribute('d', path);
}

function say(message) {
  sentence.textContent = message;
}

function showBubble(message) {
  speechBubble.textContent = message;
  speechBubble.hidden = false;
}

function hideBubble() {
  speechBubble.hidden = true;
}

function tone(frequency) {
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    const oscillator = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    oscillator.connect(gain);
    gain.connect(audioCtx.destination);
    oscillator.type = 'sine';
    oscillator.frequency.value = frequency;
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.28);
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.28);
  } catch (error) {
  }
}

function refreshSpeechVoices() {
  if (!('speechSynthesis' in window)) {
    availableSpeechVoices = [];
    return;
  }

  const browserVoices = window.speechSynthesis.getVoices();
  availableSpeechVoices = browserVoices.filter((voice) => voice.lang && voice.lang.toLowerCase().startsWith('en'));
  if (!availableSpeechVoices.length) {
    availableSpeechVoices = browserVoices.slice();
  }

  Object.keys(assignedCharacterVoiceUris).forEach((characterId) => {
    const voiceUri = assignedCharacterVoiceUris[characterId];
    const stillAvailable = availableSpeechVoices.some((voice) => voice.voiceURI === voiceUri);
    if (!stillAvailable) {
      delete assignedCharacterVoiceUris[characterId];
    }
  });
}

function getCharacterVoiceProfile(characterId = currentCharacter) {
  return CHARACTER_VOICE_PROFILES[characterId] || { rate: 1, pitch: 1, voiceHints: [] };
}

function chooseVoiceMatch(candidates, usedVoiceUris, voiceHints) {
  return candidates.find((voice) => {
    const voiceKey = `${voice.name} ${voice.voiceURI}`.toLowerCase();
    return !usedVoiceUris.has(voice.voiceURI) && voiceHints.some((hint) => voiceKey.includes(hint));
  }) || null;
}

function pickVoiceForCharacter(characterId = currentCharacter) {
  if (!('speechSynthesis' in window)) {
    return null;
  }

  if (!availableSpeechVoices.length) {
    refreshSpeechVoices();
  }
  if (!availableSpeechVoices.length) {
    return null;
  }

  const cachedVoiceUri = assignedCharacterVoiceUris[characterId];
  if (cachedVoiceUri) {
    const cachedVoice = availableSpeechVoices.find((voice) => voice.voiceURI === cachedVoiceUri);
    if (cachedVoice) {
      return cachedVoice;
    }
  }

  const { voiceHints = [] } = getCharacterVoiceProfile(characterId);
  const normalizedHints = voiceHints.map((hint) => hint.toLowerCase());
  const usedVoiceUris = new Set(
    Object.entries(assignedCharacterVoiceUris)
      .filter(([assignedCharacterId]) => assignedCharacterId !== characterId)
      .map(([, voiceUri]) => voiceUri)
  );

  const matchedVoice = chooseVoiceMatch(availableSpeechVoices, usedVoiceUris, normalizedHints)
    || availableSpeechVoices.find((voice) => {
      const voiceKey = `${voice.name} ${voice.voiceURI}`.toLowerCase();
      return normalizedHints.some((hint) => voiceKey.includes(hint));
    })
    || availableSpeechVoices.find((voice) => !usedVoiceUris.has(voice.voiceURI))
    || availableSpeechVoices[0]
    || null;

  if (matchedVoice) {
    assignedCharacterVoiceUris[characterId] = matchedVoice.voiceURI;
  }

  return matchedVoice;
}

function initializeSpeechVoices() {
  if (!('speechSynthesis' in window)) {
    return;
  }

  refreshSpeechVoices();
  if (typeof window.speechSynthesis.addEventListener === 'function') {
    window.speechSynthesis.addEventListener('voiceschanged', refreshSpeechVoices);
  } else {
    window.speechSynthesis.onvoiceschanged = refreshSpeechVoices;
  }
}

function speak(text) {
  if (!('speechSynthesis' in window)) {
    return;
  }

  try {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    const voiceProfile = getCharacterVoiceProfile();
    const selectedVoice = pickVoiceForCharacter();
    utterance.lang = 'en-US';
    utterance.rate = voiceProfile.rate;
    utterance.pitch = voiceProfile.pitch;
    if (selectedVoice) {
      utterance.voice = selectedVoice;
      utterance.lang = selectedVoice.lang || 'en-US';
    }
    window.speechSynthesis.speak(utterance);
  } catch (error) {
  }
}

function queueTask(fn, delay) {
  const handle = window.setTimeout(fn, delay);
  queuedTasks.push(handle);
}

function clearQueuedTasks() {
  queuedTasks.forEach((handle) => window.clearTimeout(handle));
  queuedTasks = [];
}

function clearOutfit({ rerender = false } = {}) {
  worn = new Set();
  syncItemButtons();
  if (rerender) {
    renderCharacter();
  } else {
    ITEMS.forEach((item) => {
      item.svgIds.forEach((id) => {
        const element = document.getElementById(id);
        if (element) {
          element.classList.add('hidden');
          element.classList.remove('anim-on', 'anim-off');
        }
      });
    });
    updateMouth();
  }
}

function buildWearSentence() {
  const phrases = ITEMS
    .filter((item) => worn.has(item.id))
    .map((item) => item.phrase);

  if (phrases.length === 0) {
    return '';
  }

  if (phrases.length === 1) {
    return `${phrases[0]}を みにつけているよ。`;
  }

  if (phrases.length === 2) {
    return `${phrases[0]}と ${phrases[1]}を みにつけているよ。`;
  }

  const leading = phrases.slice(0, -1).join('、');
  const finalPhrase = phrases[phrases.length - 1];
  return `${leading}、${finalPhrase}を みにつけているよ。`;
}

function pickRandom(list) {
  return list[Math.floor(Math.random() * list.length)];
}

function buildFinishSpeech() {
  return pickRandom(LETS_PHRASES);
}

function setInteractionEnabled(enabled) {
  selector.querySelectorAll('.character-btn').forEach((button) => {
    button.disabled = !enabled;
  });
  grid.querySelectorAll('.item-btn').forEach((button) => {
    button.disabled = !enabled;
  });
  resetButton.disabled = !enabled;
  micButton.disabled = !enabled || !speechSupported;
  finishButton.disabled = !enabled;
}

function handleFinish(bubbleText) {
  if (celebrationMode) {
    return;
  }

  stopSpeechRecognition({ reason: 'finish' });
  setAwaitingRoundReset(false);

  if (worn.size === 0) {
    say(UI_TEXT.emptyFinish);
    finishButton.classList.remove('alert');
    void finishButton.offsetWidth;
    finishButton.classList.add('alert');
    if (soundOn) {
      tone(240);
      speak(SPEECH_TEXT.emptyFinish);
    }
    return;
  }

  clearQueuedTasks();
  celebrationMode = true;
  setInteractionEnabled(false);
  const finishSpeech = bubbleText || buildFinishSpeech();
  showBubble(finishSpeech);
  updateMouth('ready');

  const wearSentence = buildWearSentence();
  say(wearSentence);
  spawnConfetti();

  if (soundOn) {
    tone(780);
    speak(finishSpeech);
  }

  characterSlot.classList.add('waving');
  queueTask(() => {
    characterSlot.classList.remove('waving');
    startWalking();
  }, 950);
}

function startWalking() {
  const margin = 16;
  const walkDistance = Math.max(0, walkTrack.clientWidth - characterSlot.offsetWidth - margin);
  characterSlot.style.transform = 'translateX(0)';
  characterSlot.style.setProperty('--walk-distance', `${walkDistance}px`);
  characterSlot.classList.add('walking');
}

function finishCelebration() {
  const finalDistance = characterSlot.style.getPropertyValue('--walk-distance') || '0px';
  characterSlot.classList.remove('walking');
  characterSlot.style.transform = `translateX(${finalDistance})`;
  setAwaitingRoundReset(true);
  say(UI_TEXT.clickAnywhere);
}

function startNewRound() {
  stopSpeechRecognition({ reason: 'new-round' });
  clearQueuedTasks();
  setAwaitingRoundReset(false);
  celebrationMode = false;
  characterSlot.classList.remove('walking', 'waving');
  characterSlot.style.transform = 'translateX(0)';
  characterSlot.style.removeProperty('--walk-distance');
  hideBubble();
  clearConfetti();
  clearOutfit({ rerender: true });
  resetSpeechFeedback();
  setInteractionEnabled(true);
  say(UI_TEXT.defaultPrompt);
  updateMouth();
}

function clearConfetti() {
  confettiOverlay.innerHTML = '';
}

function spawnConfetti() {
  clearConfetti();
  for (let index = 0; index < 42; index += 1) {
    const piece = document.createElement('span');
    piece.className = `confetti${index % 5 === 0 ? ' round' : ''}`;
    piece.style.left = `${6 + Math.random() * 88}%`;
    piece.style.background = COLORS[index % COLORS.length];
    piece.style.setProperty('--drift', `${-60 + Math.random() * 120}px`);
    piece.style.setProperty('--spin', `${220 + Math.random() * 380}deg`);
    piece.style.animationDelay = `${Math.random() * 0.25}s`;
    confettiOverlay.appendChild(piece);
    piece.addEventListener('animationend', () => piece.remove(), { once: true });
  }
}
